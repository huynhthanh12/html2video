<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML → Video Converter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f11; --surface: #1a1a1f; --surface2: #242429;
      --border: #2e2e35; --accent: #7c6af7; --accent-dim: #5b4fd6;
      --text: #e8e8ec; --muted: #8a8a9a; --success: #34c77b;
      --error: #e8524a; --warning: #f0a429; --radius: 12px;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 100%; max-width: 580px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.4px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .dropzone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 40px 24px; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; margin-bottom: 24px; position: relative; }
    .dropzone:hover, .dropzone.dragover { border-color: var(--accent); background: rgba(124,106,247,.06); }
    .dropzone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .drop-icon { font-size: 32px; margin-bottom: 10px; }
    .drop-label { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
    .drop-hint { font-size: 13px; color: var(--muted); }
    .file-chosen { display: none; align-items: center; gap: 10px; background: var(--surface2); border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 24px; }
    .file-chosen.show { display: flex; }
    .file-chosen .fname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; padding: 0; }
    .presets { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .preset-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 14px; font-size: 12px; cursor: pointer; color: var(--muted); transition: all .15s; }
    .preset-chip:hover, .preset-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(124,106,247,.08); }
    .params { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    input[type="number"], select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 9px 12px; font-size: 14px; outline: none; transition: border-color .2s; }
    input[type="number"]:focus, select:focus { border-color: var(--accent); }
    .btn-convert { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background .2s, opacity .2s; }
    .btn-convert:hover { background: var(--accent-dim); }
    .btn-convert:disabled { opacity: .5; cursor: not-allowed; }

    /* Log panel */
    .log-panel { display: none; margin-top: 20px; background: #0a0a0c; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .log-panel.show { display: block; }
    .log-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--muted); }
    .log-status { display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
    .status-dot.running { background: var(--accent); animation: pulse 1s infinite; }
    .status-dot.done { background: var(--success); }
    .status-dot.error { background: var(--error); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .log-body { padding: 12px 14px; max-height: 220px; overflow-y: auto; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; line-height: 1.8; }
    .log-line { display: flex; gap: 10px; }
    .log-time { color: #444; flex-shrink: 0; }
    .log-msg { color: #aaa; }
    .log-msg.progress { color: #7c6af7; }
    .log-msg.success { color: var(--success); }
    .log-msg.error { color: var(--error); }

    /* Progress bar */
    .progress-wrap { display: none; margin-top: 14px; }
    .progress-wrap.show { display: block; }
    .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .progress-bar-bg { background: var(--surface2); border-radius: 99px; height: 5px; overflow: hidden; }
    .progress-bar-fill { background: var(--accent); height: 100%; border-radius: 99px; width: 0%; transition: width .4s ease; }

    /* Result */
    .result { display: none; margin-top: 16px; padding: 14px; background: var(--surface2); border-radius: var(--radius); text-align: center; }
    .result.show { display: block; }
    .result.success { border: 1px solid rgba(52,199,123,.3); }
    .result.error { border: 1px solid rgba(232,82,74,.3); }
    .result-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .result.success .result-title { color: var(--success); }
    .result.error .result-title { color: var(--error); }
    .result-msg { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
    .btn-download { display: inline-block; background: var(--success); color: #fff; text-decoration: none; border-radius: 8px; padding: 10px 24px; font-size: 14px; font-weight: 600; }
  </style>
</head>
<body>
<div class="card">
  <h1>HTML → Video</h1>
  <p class="subtitle">Upload file HTML hoặc ZIP chứa animation — nhận MP4</p>

  <div class="dropzone" id="dropzone">
    <input type="file" id="fileInput" accept=".html,.zip">
    <div class="drop-icon">📁</div>
    <div class="drop-label">Kéo thả hoặc click để chọn file</div>
    <div class="drop-hint">.html hoặc .zip — tối đa 50MB</div>
  </div>

  <div class="file-chosen" id="fileChosen">
    <span>📄</span>
    <span class="fname" id="fileName"></span>
    <button class="remove" id="removeFile">×</button>
  </div>

  <div class="presets">
    <span style="font-size:12px;color:var(--muted);align-self:center;">Preset:</span>
    <button class="preset-chip" data-w="1920" data-h="1080">1080p</button>
    <button class="preset-chip active" data-w="1280" data-h="720">720p</button>
    <button class="preset-chip" data-w="854" data-h="480">480p</button>
    <button class="preset-chip" data-w="1080" data-h="1920">9:16 (Reels)</button>
    <button class="preset-chip" data-w="1080" data-h="1080">1:1 (Square)</button>
  </div>

  <div class="params">
    <div><label>Thời lượng (giây)</label><input type="number" id="duration" value="10" min="1" max="120"></div>
    <div><label>FPS</label><select id="fps"><option value="24">24 fps</option><option value="30" selected>30 fps</option><option value="60">60 fps</option></select></div>
    <div><label>Chiều rộng (px)</label><input type="number" id="width" value="1280" min="100" max="3840"></div>
    <div><label>Chiều cao (px)</label><input type="number" id="height" value="720" min="100" max="3840"></div>
  </div>

  <button class="btn-convert" id="btnConvert" disabled>Chuyển đổi</button>

  <!-- Log panel realtime -->
  <div class="log-panel" id="logPanel">
    <div class="log-header">
      <div class="log-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Đang xử lý...</span>
      </div>
      <span id="logCount">0 bước</span>
    </div>
    <div class="log-body" id="logBody"></div>
    <div style="padding: 0 14px 12px;">
      <div class="progress-wrap show">
        <div class="progress-label"><span id="progressStatus">Đang render...</span><span id="progressPct">0%</span></div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
      </div>
    </div>
  </div>

  <div class="result" id="resultBox">
    <div class="result-title" id="resultTitle"></div>
    <div class="result-msg" id="resultMsg"></div>
    <a class="btn-download" id="downloadLink" href="#" download style="display:none">⬇ Tải video</a>
  </div>
</div>

<script>
let selectedFile = null;
let eventSource = null;
let logCount = 0;

const fileInput = document.getElementById('fileInput');
const dropzone = document.getElementById('dropzone');
const fileChosen = document.getElementById('fileChosen');
const fileName = document.getElementById('fileName');
const btnConvert = document.getElementById('btnConvert');

fileInput.addEventListener('change', () => setFile(fileInput.files[0]));
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('dragover'); setFile(e.dataTransfer.files[0]); });
document.getElementById('removeFile').addEventListener('click', () => {
  selectedFile = null; fileInput.value = '';
  fileChosen.classList.remove('show'); dropzone.style.display = ''; btnConvert.disabled = true;
});

function setFile(file) {
  if (!file) return;
  selectedFile = file;
  fileName.textContent = file.name;
  fileChosen.classList.add('show');
  dropzone.style.display = 'none';
  btnConvert.disabled = false;
}

document.querySelectorAll('.preset-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.preset-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    document.getElementById('width').value = chip.dataset.w;
    document.getElementById('height').value = chip.dataset.h;
  });
});

btnConvert.addEventListener('click', async () => {
  if (!selectedFile) return;
  resetUI();

  const fd = new FormData();
  fd.append('file', selectedFile);
  fd.append('duration', document.getElementById('duration').value);
  fd.append('fps', document.getElementById('fps').value);
  fd.append('width', document.getElementById('width').value);
  fd.append('height', document.getElementById('height').value);

  btnConvert.disabled = true;
  showLogPanel();

  try {
    const res = await fetch('/convert', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Lỗi server');
    connectSSE(data.jobId);
  } catch (err) {
    showError(err.message);
    btnConvert.disabled = false;
  }
});

function connectSSE(jobId) {
  eventSource = new EventSource(`/logs/${jobId}`);
  eventSource.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if (data.done) {
      eventSource.close();
      setStatusDot('done');
      document.getElementById('statusText').textContent = 'Hoàn thành!';
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('progressPct').textContent = '100%';
      document.getElementById('progressStatus').textContent = 'Xong!';
      showSuccess(data.downloadUrl);
      btnConvert.disabled = false;
      return;
    }

    if (data.error) {
      eventSource.close();
      setStatusDot('error');
      document.getElementById('statusText').textContent = 'Lỗi!';
      showError(data.error);
      btnConvert.disabled = false;
      return;
    }

    // Log entry
    if (data.message) {
      addLog(data.time, data.message, data.type);

      // Cập nhật progress bar từ log progress
      if (data.type === 'progress') {
        const match = data.message.match(/\((\d+)%\)/);
        if (match) {
          const pct = parseInt(match[1]);
          document.getElementById('progressFill').style.width = pct + '%';
          document.getElementById('progressPct').textContent = pct + '%';
          document.getElementById('progressStatus').textContent = 'Đang capture frames...';
        }
      }
    }
  };
  eventSource.onerror = () => {
    // SSE reconnect tự động, không cần xử lý
  };
}

function addLog(time, message, type) {
  const body = document.getElementById('logBody');
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="log-time">${time}</span><span class="log-msg ${type || ''}">${message}</span>`;
  body.appendChild(line);
  body.scrollTop = body.scrollHeight;
  logCount++;
  document.getElementById('logCount').textContent = logCount + ' bước';
}

function showLogPanel() {
  document.getElementById('logPanel').classList.add('show');
  setStatusDot('running');
  document.getElementById('statusText').textContent = 'Đang xử lý...';
  logCount = 0;
}

function setStatusDot(state) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + state;
}

function showSuccess(url) {
  const box = document.getElementById('resultBox');
  box.className = 'result show success';
  document.getElementById('resultTitle').textContent = '✅ Video đã sẵn sàng';
  document.getElementById('resultMsg').textContent = 'Bấm nút bên dưới để tải về máy.';
  const link = document.getElementById('downloadLink');
  link.href = url; link.style.display = 'inline-block';
}

function showError(msg) {
  const box = document.getElementById('resultBox');
  box.className = 'result show error';
  document.getElementById('resultTitle').textContent = '❌ Lỗi';
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('downloadLink').style.display = 'none';
}

function resetUI() {
  if (eventSource) { eventSource.close(); eventSource = null; }
  document.getElementById('logPanel').classList.remove('show');
  document.getElementById('logBody').innerHTML = '';
  document.getElementById('resultBox').className = 'result';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressPct').textContent = '0%';
  logCount = 0;
}
</script>
</body>
</html>
